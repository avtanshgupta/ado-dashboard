name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: Lint · Test · Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Deterministic installs from the committed lockfiles (root + server + web).
      - name: Install root dev dependencies
        run: npm ci

      - name: Install server dependencies
        run: npm --prefix server ci

      - name: Install web dependencies
        run: npm --prefix web ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build web
        run: npm run build

  security-scan:
    name: Dependency & secret scan (report-only)
    runs-on: ubuntu-latest
    # Advisory only for now — never blocks the pipeline while we triage findings.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Audit server dependencies
        run: npm --prefix server audit --audit-level=high || true

      - name: Audit web dependencies
        run: npm --prefix web audit --audit-level=high || true

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
